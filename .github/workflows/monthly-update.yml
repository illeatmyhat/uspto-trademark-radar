# Manual-dispatch fallback for the monthly USPTO update (the scheduled
# monthly run lives on HF Jobs — docs/CLOUD.md "Monthly schedule").
#
# Stateless: restores bronze from the HF mirror, tops up from USPTO, then
# parse -> build -> reconcile -> release -> publish (silver + mirror).
#
# Required repo secrets (only if dispatching this workflow):
#   USPTO_API_KEY  data.uspto.gov key (RUNBOOK section 1)
#   HF_TOKEN       write token for the two HF dataset repos

name: monthly-update

on:
  workflow_dispatch:
    inputs:
      from_mirror:
        description: restore bronze from the HF mirror first
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: monthly-update
  cancel-in-progress: false

env:
  SILVER_REPO: illeatmyhat/uspto-trademarks
  BRONZE_REPO: illeatmyhat/uspto-trademarks-bronze

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # hosted-runner hard cap is 360; stages resume from the ledger on re-run
    steps:
      - name: Free disk space (~50 GB needed for bronze + parse cache + build + spill)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup
          sudo docker image prune -af >/dev/null 2>&1 || true
          df -h /

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install pipeline
        run: uv sync --locked

      - name: Restore parse cache (best effort; 10 GB repo cache cap)
        uses: actions/cache@v4
        with:
          path: data/silver_parts
          key: silver-parts-v1-${{ github.run_id }}
          restore-keys: silver-parts-v1-

      - name: Run monthly update
        env:
          USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          FLAGS="--repo $SILVER_REPO --bronze-repo $BRONZE_REPO"
          if [ "${{ inputs.from_mirror != false }}" = "true" ]; then
            FLAGS="$FLAGS --from-mirror $BRONZE_REPO"
          fi
          uv run trademark-radar run $FLAGS

      - name: Publish profile as run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-profile
          path: |
            data/builds/*/profile/
            data/builds/*/build_meta.json
          if-no-files-found: ignore
          retention-days: 90
